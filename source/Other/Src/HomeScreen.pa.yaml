Screens:
  HomeScreen:
    Properties:
      OnVisible: =Set(varShDelConfirm, false)
    Children:
      - Text1:
          Control: ModernText@1.0.0
          Properties:
            Align: =Align.Center
            Width: =167
            X: =245
            Y: =20
      - ButtonCanvas1:
          Control: Button@0.0.45
          Properties:
            FontSize: =18
            Icon: ="Dismiss"
            OnSelect: =UpdateIf('ELEC1005-Lab-Habits', 'Completed Today' = true, {'Completed Today':false})
            Text: ="Reset Done Today"
            Width: =207
            X: =17
            Y: =104
      - DropdownCanvas1:
          Control: DropDown@0.0.45
          Properties:
            DefaultSelectedItems: =["All"]
            FontSize: =18
            Items: =["All","Wellness","Exercise","Mindfulness","Other"]
            Width: =210
            X: =412
            Y: =104
      - DelContainer:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            Fill: =RGBA(0, 0, 0, 0.4)
            Height: =108
            Visible: =varShDelConfirm
            Width: =605
            X: =17
            Y: =542
          Children:
            - Text4:
                Control: ModernText@1.0.0
                Properties:
                  Height: =82
                  Text: ="Are you sure you want to delete this item? This action cannot be undone."
                  Width: =615
                  X: =13
                  Y: =10
            - ButtonCanvas11:
                Control: Button@0.0.45
                Properties:
                  OnSelect: |-
                    =Set(varItemDel, Blank());
                    Set(varShDelConfirm,false)
                  Text: ="Cancel"
                  X: =468
                  Y: =60
            - ButtonCanvas12:
                Control: Button@0.0.45
                Properties:
                  Icon: ="Delete"
                  OnSelect: |-
                    =IfError(Remove('ELEC1005-Lab-Habits', varItemDel), Notify("Delete failed. You may not have permission or the item was already removed.",NotificationType.Error),
                    Notify(
                            "Item deleted successfully.",
                            NotificationType.Success
                        )
                    );
                    Set(varItemDel,Blank());
                    Set(varShDelConfirm, false)
                  Text: ="Delete"
                  X: =358
                  Y: =60
      - Gallery1:
          Control: Gallery@2.15.0
          Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0
          Properties:
            Height: =942
            Items: =If(DropdownCanvas1.Selected.Value = "All", 'ELEC1005-Lab-Habits', Filter('ELEC1005-Lab-Habits', Category.Value = DropdownCanvas1.Selected.Value))
            ShowNavigation: =true
            Y: =136
          Children:
            - Image1:
                Control: Image@2.2.3
                Properties:
                  Height: =72
                  OnSelect: =Select(Parent)
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  Width: =72
                  X: =16
                  Y: =(Parent.TemplateHeight / 2) - (Self.Height / 2)
            - Title1:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 1)
                  Color: =RGBA(50, 49, 48, 1)
                  FontWeight: =If(ThisItem.IsSelected, FontWeight.Semibold, FontWeight.Normal)
                  Height: =Self.Size * 1.8
                  OnSelect: =Select(Parent)
                  PaddingBottom: =0
                  PaddingLeft: =0
                  PaddingRight: =0
                  PaddingTop: =0
                  Size: =14
                  Text: =ThisItem.Title
                  VerticalAlign: =VerticalAlign.Top
                  Width: =Parent.TemplateWidth - 173
                  X: =103
                  Y: =(Parent.TemplateHeight - (Self.Size * 1.8 + Subtitle1.Size * 1.8)) / 2
            - Subtitle1:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 1)
                  FontWeight: =If(ThisItem.IsSelected, FontWeight.Semibold, FontWeight.Normal)
                  Height: =Self.Size * 1.8
                  OnSelect: =Select(Parent)
                  PaddingBottom: =0
                  PaddingLeft: =0
                  PaddingRight: =0
                  PaddingTop: =0
                  Size: =12
                  Text: =ThisItem.Category.Value
                  VerticalAlign: =VerticalAlign.Top
                  Width: =Title1.Width
                  X: =Title1.X
                  Y: =Title1.Y + Title1.Height
            - NextArrow1:
                Control: Classic/Icon@2.5.0
                Properties:
                  AccessibleLabel: =Self.Tooltip
                  BorderColor: =RGBA(0, 0, 0, 1)
                  Color: =RGBA(166, 166, 166, 1)
                  DisabledBorderColor: =RGBA(56, 56, 56, 1)
                  DisabledColor: =RGBA(119, 119, 119, 1)
                  Height: =50
                  Icon: =Icon.ChevronRight
                  OnSelect: =Select(Parent)
                  PaddingBottom: =16
                  PaddingLeft: =16
                  PaddingRight: =16
                  PaddingTop: =16
                  Tooltip: ="View item details"
                  Width: =50
                  X: =Parent.TemplateWidth - Self.Width - 12
                  Y: =(Parent.TemplateHeight / 2) - (Self.Height / 2)
            - Separator1:
                Control: Rectangle@2.3.0
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  Height: =8
                  OnSelect: =Select(Parent)
                  Width: =Parent.TemplateWidth
                  Y: =Parent.TemplateHeight - Self.Height
            - Text5:
                Control: ModernText@1.0.0
                Properties:
                  Text: =ThisItem.Frequency.Value
                  Width: =101
                  X: =213
                  Y: =28
            - Rectangle1:
                Control: Rectangle@2.3.0
                Properties:
                  Fill: =App.Theme.Colors.Darker30
                  Height: =Parent.TemplateHeight - Separator1.Height
                  OnSelect: =Select(Parent)
                  Visible: =ThisItem.IsSelected
                  Width: =4
            - ButtonCanvas8:
                Control: Button@0.0.45
                Properties:
                  Height: =31
                  Icon: ="Delete"
                  OnSelect: |-
                    =Set(varItemDel, ThisItem);
                    Set(varShDelConfirm,true)
                  Text: =
                  Width: =34
                  X: =332
                  Y: =38
            - Toggle1:
                Control: Toggle@1.1.5
                Properties:
                  Checked: =ThisItem.'Completed Today'
                  Height: =40
                  Label: ="Done today"
                  OnCheck: =Patch('ELEC1005-Lab-Habits',ThisItem, {'Completed Today':true})
                  OnUncheck: =Patch('ELEC1005-Lab-Habits',ThisItem, {'Completed Today':false})
                  Width: =164
                  X: =413
                  Y: =34
            - ButtonCanvas7:
                Control: Button@0.0.45
                Properties:
                  Height: =33
                  Icon: ="Edit"
                  OnSelect: |-
                    =Navigate(EditHabit, ScreenTransition.Fade, {varSelectedItem: ThisItem})
                  Text: =
                  Width: =36
                  X: =377
                  Y: =38
      - ButtonCanvas2:
          Control: Button@0.0.45
          Properties:
            Align: =Align.Center
            FontSize: =18
            Icon: ="Add"
            OnSelect: =Navigate(AddHabit, ScreenTransition.Fade)
            Text: ="Habit"
            Width: =97
            X: =245
            Y: =104

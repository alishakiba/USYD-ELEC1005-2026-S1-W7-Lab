Screens:
  AddHabit:
    Children:
      - Form1:
          Control: Form@2.4.4
          Layout: Vertical
          Properties:
            DataSource: ='ELEC1005-Lab-Habits'
            DefaultMode: =FormMode.New
            Height: =310
            OnFailure: |-
              =Notify(
                  "Save failed: " & Form1.Error,
                  NotificationType.Error
              )
            OnSuccess: =If(varReturn, ResetForm(Form1);Navigate(HomeScreen,ScreenTransition.Fade), ResetForm(Form1);NewForm(Form1))
            Y: =180
          Children:
            - Title_DataCard1:
                Control: TypedDataCard@1.0.7
                Variant: TextualEdit
                IsLocked: true
                Properties:
                  DataField: ="Title"
                  Default: =ThisItem.Title
                  DisplayName: =DataSourceInfo([@'ELEC1005-Lab-Habits'],DataSourceInfo.DisplayName,'Title')
                  MaxLength: =DataSourceInfo([@'ELEC1005-Lab-Habits'], DataSourceInfo.MaxLength, 'Title')
                  Required: =false
                  Update: =DataCardValue1.Value
                  X: =0
                  Y: =0
                Children:
                  - DataCardKey1:
                      Control: Text@0.0.51
                      MetadataKey: FieldName
                      Properties:
                        Height: =22
                        Text: =Parent.DisplayName
                        Weight: ='TextCanvas.Weight'.Semibold
                        Width: =Parent.Width - 48
                        Wrap: =false
                        X: =24
                        Y: =10
                  - DataCardValue1:
                      Control: TextInput@0.0.54
                      MetadataKey: FieldValue
                      Properties:
                        AccessibleLabel: =Parent.DisplayName
                        DisplayMode: =Parent.DisplayMode
                        Mode: ="'TextInputCanvas.Mode'.TextInputModeSingleLine"
                        Required: =Parent.Required
                        ValidationState: =If(IsBlank(Parent.Error), "None", "Error")
                        Value: =Parent.Default
                        Width: =Parent.Width - 48
                        X: =24
                        Y: =DataCardKey1.Y + DataCardKey1.Height + 4
                  - ErrorMessage1:
                      Control: Text@0.0.51
                      MetadataKey: ErrorMessage
                      Properties:
                        Height: =30
                        Text: =Parent.Error
                        Visible: =And(!IsBlank(Parent.Error), Parent.DisplayMode=DisplayMode.Edit)
                        Width: =Parent.Width - 48
                        X: =24
                        Y: =DataCardValue1.Y + DataCardValue1.Height
                  - StarVisible1:
                      Control: Text@0.0.51
                      MetadataKey: FieldRequired
                      Properties:
                        Align: ='TextCanvas.Align'.Center
                        Height: =30
                        Text: ="*"
                        Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                        Width: =30
                        Y: =DataCardKey1.Y
            - Category_DataCard1:
                Control: TypedDataCard@1.0.7
                Variant: ComboBoxEdit
                IsLocked: true
                Properties:
                  DataField: ="Category"
                  Default: =ThisItem.Category
                  DisplayName: =DataSourceInfo([@'ELEC1005-Lab-Habits'],DataSourceInfo.DisplayName,'Category')
                  Required: =false
                  Update: =DataCardValue2.Selected
                  X: =0
                  Y: =1
                Children:
                  - DataCardKey2:
                      Control: Text@0.0.51
                      MetadataKey: FieldName
                      Properties:
                        Height: =22
                        Text: =Parent.DisplayName
                        Weight: ='TextCanvas.Weight'.Semibold
                        Width: =Parent.Width - 48
                        Wrap: =false
                        X: =24
                        Y: =10
                  - DataCardValue2:
                      Control: ComboBox@0.0.51
                      MetadataKey: FieldValue
                      Properties:
                        AccessibleLabel: =Parent.DisplayName
                        DefaultSelectedItems: =[Parent.Default]
                        DisplayMode: =Parent.DisplayMode
                        Items: =Choices([@'ELEC1005-Lab-Habits'].'Category')
                        Required: =Parent.Required
                        ValidationState: =If(IsBlank(Parent.Error), "None", "Error")
                        Width: =Parent.Width - 48
                        X: =24
                        Y: =DataCardKey2.Y + DataCardKey2.Height + 4
                  - ErrorMessage2:
                      Control: Text@0.0.51
                      MetadataKey: ErrorMessage
                      Properties:
                        Height: =30
                        Text: =Parent.Error
                        Visible: =And(!IsBlank(Parent.Error), Parent.DisplayMode=DisplayMode.Edit)
                        Width: =Parent.Width - 48
                        X: =24
                        Y: =DataCardValue2.Y + DataCardValue2.Height
                  - StarVisible2:
                      Control: Text@0.0.51
                      MetadataKey: FieldRequired
                      Properties:
                        Align: ='TextCanvas.Align'.Center
                        Height: =20
                        Text: ="*"
                        Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                        Width: =30
                        Y: =DataCardKey2.Y
            - Frequency_DataCard1:
                Control: TypedDataCard@1.0.7
                Variant: ComboBoxEdit
                IsLocked: true
                Properties:
                  DataField: ="Frequency"
                  Default: =ThisItem.Frequency
                  DisplayName: =DataSourceInfo([@'ELEC1005-Lab-Habits'],DataSourceInfo.DisplayName,'Frequency')
                  Required: =false
                  Update: =DataCardValue3.Selected
                  X: =0
                  Y: =2
                Children:
                  - DataCardKey3:
                      Control: Text@0.0.51
                      MetadataKey: FieldName
                      Properties:
                        Height: =22
                        Text: =Parent.DisplayName
                        Weight: ='TextCanvas.Weight'.Semibold
                        Width: =Parent.Width - 48
                        Wrap: =false
                        X: =24
                        Y: =10
                  - DataCardValue3:
                      Control: ComboBox@0.0.51
                      MetadataKey: FieldValue
                      Properties:
                        AccessibleLabel: =Parent.DisplayName
                        DefaultSelectedItems: =[Parent.Default]
                        DisplayMode: =Parent.DisplayMode
                        Items: =Choices([@'ELEC1005-Lab-Habits'].'Frequency')
                        Required: =Parent.Required
                        ValidationState: =If(IsBlank(Parent.Error), "None", "Error")
                        Width: =Parent.Width - 48
                        X: =24
                        Y: =DataCardKey3.Y + DataCardKey3.Height + 4
                  - ErrorMessage3:
                      Control: Text@0.0.51
                      MetadataKey: ErrorMessage
                      Properties:
                        Height: =30
                        Text: =Parent.Error
                        Visible: =And(!IsBlank(Parent.Error), Parent.DisplayMode=DisplayMode.Edit)
                        Width: =Parent.Width - 48
                        X: =24
                        Y: =DataCardValue3.Y + DataCardValue3.Height
                  - StarVisible3:
                      Control: Text@0.0.51
                      MetadataKey: FieldRequired
                      Properties:
                        Align: ='TextCanvas.Align'.Center
                        Height: =20
                        Text: ="*"
                        Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                        Width: =30
                        Y: =DataCardKey3.Y
            - Completed Today_DataCard1:
                Control: TypedDataCard@1.0.7
                Variant: ToggleEdit
                IsLocked: true
                Properties:
                  DataField: ="CompletedToday"
                  Default: =ThisItem.'Completed Today'
                  DisplayName: =DataSourceInfo([@'ELEC1005-Lab-Habits'],DataSourceInfo.DisplayName,'CompletedToday')
                  Required: =false
                  Update: =DataCardValue4.Checked
                  X: =0
                  Y: =3
                Children:
                  - DataCardKey4:
                      Control: Text@0.0.51
                      MetadataKey: FieldName
                      Properties:
                        Height: =22
                        Text: =Parent.DisplayName
                        Weight: ='TextCanvas.Weight'.Semibold
                        Width: =Parent.Width - 48
                        Wrap: =false
                        X: =24
                        Y: =10
                  - DataCardValue4:
                      Control: Toggle@1.1.5
                      MetadataKey: FieldValue
                      Properties:
                        AccessibleLabel: =If(Parent.Required, Substitute("{0}. Required.", "{0}", Parent.DisplayName), Parent.DisplayName)
                        Checked: =Parent.Default
                        DisplayMode: =Parent.DisplayMode
                        Height: =32
                        Label: =""
                        Width: =Parent.Width - 48
                        X: =24
                        Y: =DataCardKey4.Y + DataCardKey4.Height + 4
                  - ErrorMessage4:
                      Control: Text@0.0.51
                      MetadataKey: ErrorMessage
                      Properties:
                        Height: =30
                        Text: =Parent.Error
                        Visible: =And(!IsBlank(Parent.Error), Parent.DisplayMode=DisplayMode.Edit)
                        Width: =Parent.Width - 48
                        X: =24
                        Y: =DataCardValue4.Y + DataCardValue4.Height
                  - StarVisible4:
                      Control: Text@0.0.51
                      MetadataKey: FieldRequired
                      Properties:
                        Align: ='TextCanvas.Align'.Center
                        Height: =30
                        Text: ="*"
                        Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                        Width: =30
                        Y: =DataCardKey4.Y
            - Content type_DataCard1:
                Control: TypedDataCard@1.0.7
                Variant: ComboBoxEdit
                IsLocked: true
                Properties:
                  DataField: ="{ContentType}"
                  Default: =ThisItem.'Content type'
                  DisplayName: =DataSourceInfo([@'ELEC1005-Lab-Habits'],DataSourceInfo.DisplayName,'{ContentType}')
                  Required: =false
                  Update: =DataCardValue5.Selected
                  Visible: =false
                  X: =0
                  Y: =4
                Children:
                  - DataCardKey5:
                      Control: Text@0.0.51
                      MetadataKey: FieldName
                      Properties:
                        Height: =22
                        Text: =Parent.DisplayName
                        Weight: ='TextCanvas.Weight'.Semibold
                        Width: =Parent.Width - 48
                        Wrap: =false
                        X: =24
                        Y: =10
                  - DataCardValue5:
                      Control: ComboBox@0.0.51
                      MetadataKey: FieldValue
                      Properties:
                        AccessibleLabel: =Parent.DisplayName
                        DefaultSelectedItems: =[Parent.Default]
                        DisplayMode: =Parent.DisplayMode
                        Items: =Choices([@'ELEC1005-Lab-Habits'].'{ContentType}')
                        Required: =Parent.Required
                        ValidationState: =If(IsBlank(Parent.Error), "None", "Error")
                        Width: =Parent.Width - 48
                        X: =24
                        Y: =DataCardKey5.Y + DataCardKey5.Height + 4
                  - ErrorMessage5:
                      Control: Text@0.0.51
                      MetadataKey: ErrorMessage
                      Properties:
                        Height: =30
                        Text: =Parent.Error
                        Visible: =And(!IsBlank(Parent.Error), Parent.DisplayMode=DisplayMode.Edit)
                        Width: =Parent.Width - 48
                        X: =24
                        Y: =DataCardValue5.Y + DataCardValue5.Height
                  - StarVisible5:
                      Control: Text@0.0.51
                      MetadataKey: FieldRequired
                      Properties:
                        Align: ='TextCanvas.Align'.Center
                        Height: =20
                        Text: ="*"
                        Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                        Width: =30
                        Y: =DataCardKey5.Y
      - Text2:
          Control: ModernText@1.0.0
          Properties:
            Align: =Align.Center
            Width: =244
            X: =198
            Y: =33
      - ButtonCanvas3:
          Control: Button@0.0.45
          Properties:
            DisplayMode: =If(Form1.Valid, DisplayMode.Edit, DisplayMode.Disabled)
            FontSize: =18
            Icon: ="Add"
            OnSelect: =Set(varReturn, true);SubmitForm(Form1)
            Text: ="Save"
            X: =26
            Y: =490
      - ButtonCanvas4:
          Control: Button@0.0.45
          Properties:
            DisplayMode: =If(Form1.Valid, DisplayMode.Edit, DisplayMode.Disabled)
            FontSize: =18
            Icon: ="Add"
            OnSelect: |-
              =Set(varReturn, false);
              SubmitForm(Form1)
            Text: ="Save and add another"
            Width: =249
            X: =133
            Y: =490
      - ButtonCanvas5:
          Control: Button@0.0.45
          Properties:
            FontSize: =18
            Icon: ="Dismiss"
            OnSelect: =ResetForm(Form1)
            Text: ="Reset"
            X: =397
            Y: =490
      - ButtonCanvas6:
          Control: Button@0.0.45
          Properties:
            FontSize: =18
            Icon: ="ArrowLeft"
            OnSelect: =ResetForm(Form1); Navigate(HomeScreen, ScreenTransition.Fade)
            Text: ="Back"
            X: =509
            Y: =490

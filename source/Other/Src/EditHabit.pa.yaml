Screens:
  EditHabit:
    Children:
      - Text3:
          Control: ModernText@1.0.0
          Properties:
            Align: =Align.Center
            Text: ="Edit habit"
            X: =232
            Y: =32
      - Form2:
          Control: Form@2.4.4
          Layout: Vertical
          Properties:
            DataSource: ='ELEC1005-Lab-Habits'
            Height: =306
            Item: =varSelectedItem
            OnFailure: |-
              =Notify(
                  "Save failed: " & Form2.Error,
                  NotificationType.Error
              )
            OnSuccess: |-
              =ResetForm(Form2);
              Navigate(HomeScreen, ScreenTransition.Fade)
            Y: =125
          Children:
            - Title_DataCard2:
                Control: TypedDataCard@1.0.7
                Variant: TextualEdit
                IsLocked: true
                Properties:
                  DataField: ="Title"
                  Default: =ThisItem.Title
                  DisplayName: =DataSourceInfo([@'ELEC1005-Lab-Habits'],DataSourceInfo.DisplayName,'Title')
                  MaxLength: =DataSourceInfo([@'ELEC1005-Lab-Habits'], DataSourceInfo.MaxLength, 'Title')
                  Required: =false
                  Update: =DataCardValue6.Value
                  X: =0
                  Y: =0
                Children:
                  - DataCardKey6:
                      Control: Text@0.0.51
                      MetadataKey: FieldName
                      Properties:
                        Height: =22
                        Text: =Parent.DisplayName
                        Weight: ='TextCanvas.Weight'.Semibold
                        Width: =Parent.Width - 48
                        Wrap: =false
                        X: =24
                        Y: =10
                  - DataCardValue6:
                      Control: TextInput@0.0.54
                      MetadataKey: FieldValue
                      Properties:
                        AccessibleLabel: =Parent.DisplayName
                        DisplayMode: =Parent.DisplayMode
                        Mode: ="'TextInputCanvas.Mode'.TextInputModeSingleLine"
                        Required: =Parent.Required
                        ValidationState: =If(IsBlank(Parent.Error), "None", "Error")
                        Value: =Parent.Default
                        Width: =Parent.Width - 48
                        X: =24
                        Y: =DataCardKey6.Y + DataCardKey6.Height + 4
                  - ErrorMessage6:
                      Control: Text@0.0.51
                      MetadataKey: ErrorMessage
                      Properties:
                        Height: =30
                        Text: =Parent.Error
                        Visible: =And(!IsBlank(Parent.Error), Parent.DisplayMode=DisplayMode.Edit)
                        Width: =Parent.Width - 48
                        X: =24
                        Y: =DataCardValue6.Y + DataCardValue6.Height
                  - StarVisible6:
                      Control: Text@0.0.51
                      MetadataKey: FieldRequired
                      Properties:
                        Align: ='TextCanvas.Align'.Center
                        Height: =30
                        Text: ="*"
                        Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                        Width: =30
                        Y: =DataCardKey6.Y
            - Category_DataCard2:
                Control: TypedDataCard@1.0.7
                Variant: ComboBoxEdit
                IsLocked: true
                Properties:
                  DataField: ="Category"
                  Default: =ThisItem.Category
                  DisplayName: =DataSourceInfo([@'ELEC1005-Lab-Habits'],DataSourceInfo.DisplayName,'Category')
                  Required: =false
                  Update: =DataCardValue7.Selected
                  X: =0
                  Y: =1
                Children:
                  - DataCardKey7:
                      Control: Text@0.0.51
                      MetadataKey: FieldName
                      Properties:
                        Height: =22
                        Text: =Parent.DisplayName
                        Weight: ='TextCanvas.Weight'.Semibold
                        Width: =Parent.Width - 48
                        Wrap: =false
                        X: =24
                        Y: =10
                  - DataCardValue7:
                      Control: ComboBox@0.0.51
                      MetadataKey: FieldValue
                      Properties:
                        AccessibleLabel: =Parent.DisplayName
                        DefaultSelectedItems: =[Parent.Default]
                        DisplayMode: =Parent.DisplayMode
                        Items: =Choices([@'ELEC1005-Lab-Habits'].'Category')
                        Required: =Parent.Required
                        ValidationState: =If(IsBlank(Parent.Error), "None", "Error")
                        Width: =Parent.Width - 48
                        X: =24
                        Y: =DataCardKey7.Y + DataCardKey7.Height + 4
                  - ErrorMessage7:
                      Control: Text@0.0.51
                      MetadataKey: ErrorMessage
                      Properties:
                        Height: =30
                        Text: =Parent.Error
                        Visible: =And(!IsBlank(Parent.Error), Parent.DisplayMode=DisplayMode.Edit)
                        Width: =Parent.Width - 48
                        X: =24
                        Y: =DataCardValue7.Y + DataCardValue7.Height
                  - StarVisible7:
                      Control: Text@0.0.51
                      MetadataKey: FieldRequired
                      Properties:
                        Align: ='TextCanvas.Align'.Center
                        Height: =20
                        Text: ="*"
                        Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                        Width: =30
                        Y: =DataCardKey7.Y
            - Frequency_DataCard2:
                Control: TypedDataCard@1.0.7
                Variant: ComboBoxEdit
                IsLocked: true
                Properties:
                  DataField: ="Frequency"
                  Default: =ThisItem.Frequency
                  DisplayName: =DataSourceInfo([@'ELEC1005-Lab-Habits'],DataSourceInfo.DisplayName,'Frequency')
                  Required: =false
                  Update: =DataCardValue8.Selected
                  X: =0
                  Y: =2
                Children:
                  - DataCardKey8:
                      Control: Text@0.0.51
                      MetadataKey: FieldName
                      Properties:
                        Height: =22
                        Text: =Parent.DisplayName
                        Weight: ='TextCanvas.Weight'.Semibold
                        Width: =Parent.Width - 48
                        Wrap: =false
                        X: =24
                        Y: =10
                  - DataCardValue8:
                      Control: ComboBox@0.0.51
                      MetadataKey: FieldValue
                      Properties:
                        AccessibleLabel: =Parent.DisplayName
                        DefaultSelectedItems: =[Parent.Default]
                        DisplayMode: =Parent.DisplayMode
                        Items: =Choices([@'ELEC1005-Lab-Habits'].'Frequency')
                        Required: =Parent.Required
                        ValidationState: =If(IsBlank(Parent.Error), "None", "Error")
                        Width: =Parent.Width - 48
                        X: =24
                        Y: =DataCardKey8.Y + DataCardKey8.Height + 4
                  - ErrorMessage8:
                      Control: Text@0.0.51
                      MetadataKey: ErrorMessage
                      Properties:
                        Height: =30
                        Text: =Parent.Error
                        Visible: =And(!IsBlank(Parent.Error), Parent.DisplayMode=DisplayMode.Edit)
                        Width: =Parent.Width - 48
                        X: =24
                        Y: =DataCardValue8.Y + DataCardValue8.Height
                  - StarVisible8:
                      Control: Text@0.0.51
                      MetadataKey: FieldRequired
                      Properties:
                        Align: ='TextCanvas.Align'.Center
                        Height: =20
                        Text: ="*"
                        Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                        Width: =30
                        Y: =DataCardKey8.Y
            - Completed Today_DataCard2:
                Control: TypedDataCard@1.0.7
                Variant: ToggleEdit
                IsLocked: true
                Properties:
                  DataField: ="CompletedToday"
                  Default: =ThisItem.'Completed Today'
                  DisplayName: =DataSourceInfo([@'ELEC1005-Lab-Habits'],DataSourceInfo.DisplayName,'CompletedToday')
                  Required: =false
                  Update: =DataCardValue9.Checked
                  X: =0
                  Y: =3
                Children:
                  - DataCardKey9:
                      Control: Text@0.0.51
                      MetadataKey: FieldName
                      Properties:
                        Height: =22
                        Text: =Parent.DisplayName
                        Weight: ='TextCanvas.Weight'.Semibold
                        Width: =Parent.Width - 48
                        Wrap: =false
                        X: =24
                        Y: =10
                  - DataCardValue9:
                      Control: Toggle@1.1.5
                      MetadataKey: FieldValue
                      Properties:
                        AccessibleLabel: =If(Parent.Required, Substitute("{0}. Required.", "{0}", Parent.DisplayName), Parent.DisplayName)
                        Checked: =Parent.Default
                        DisplayMode: =Parent.DisplayMode
                        Height: =32
                        Label: =""
                        Width: =Parent.Width - 48
                        X: =24
                        Y: =DataCardKey9.Y + DataCardKey9.Height + 4
                  - ErrorMessage9:
                      Control: Text@0.0.51
                      MetadataKey: ErrorMessage
                      Properties:
                        Height: =30
                        Text: =Parent.Error
                        Visible: =And(!IsBlank(Parent.Error), Parent.DisplayMode=DisplayMode.Edit)
                        Width: =Parent.Width - 48
                        X: =24
                        Y: =DataCardValue9.Y + DataCardValue9.Height
                  - StarVisible9:
                      Control: Text@0.0.51
                      MetadataKey: FieldRequired
                      Properties:
                        Align: ='TextCanvas.Align'.Center
                        Height: =30
                        Text: ="*"
                        Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                        Width: =30
                        Y: =DataCardKey9.Y
      - ButtonCanvas9:
          Control: Button@0.0.45
          Properties:
            DisplayMode: =If(Form2.Valid, DisplayMode.Edit, DisplayMode.Disabled)
            FontSize: =18
            Icon: ="Save"
            OnSelect: =SubmitForm(Form2)
            Text: ="Save"
            X: =24
            Y: =431
      - ButtonCanvas10:
          Control: Button@0.0.45
          Properties:
            FontSize: =18
            Icon: ="ArrowLeft"
            OnSelect: =ResetForm(Form2); Navigate(HomeScreen, ScreenTransition.Fade)
            Text: ="Discard and return"
            Width: =222
            X: =389
            Y: =431

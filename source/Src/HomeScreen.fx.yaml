HomeScreen As screen:
    Fill: =Color.White
    LoadingSpinnerColor: =App.Theme.Colors.Primary
    OnVisible: =Set(varShDelConfirm, false)

    Text1 As modernText:
        Align: =Align.Center
        Height: =50
        Text: ="Text"
        Width: =167
        X: =245
        Y: =20
        ZIndex: =1

    ButtonCanvas1 As Button:
        BasePaletteColor: =
        BorderColor: =
        DisplayMode: =DisplayMode.Edit
        FontColor: =
        FontSize: =18
        Height: =32
        Icon: ="Dismiss"
        OnSelect: |-
            =UpdateIf('ELEC1005-Lab-Habits', 'Completed Today' = true, {'Completed Today':false})
        Text: ="Reset Done Today"
        Width: =207
        X: =17
        Y: =104
        ZIndex: =2

    DropdownCanvas1 As Dropdown.pcfdataset:
        DefaultSelectedItems: =["All"]
        DisplayMode: =DisplayMode.Edit
        FontSize: =18
        Height: =32
        Items: =["All","Wellness","Exercise","Mindfulness","Other"]
        Width: =210
        X: =412
        Y: =104
        ZIndex: =3

    DelContainer As groupContainer.manualLayoutContainer:
        DropShadow: =DropShadow.Light
        Fill: =RGBA(0, 0, 0, 0.4)
        Height: =108
        LayoutGridColumnMinWidth: =0
        LayoutGridColumns: =6
        LayoutGridRowMinHeight: =0
        LayoutGridRows: =6
        RadiusBottomLeft: =4
        RadiusBottomRight: =4
        RadiusTopLeft: =4
        RadiusTopRight: =4
        Visible: =varShDelConfirm
        Width: =605
        X: =17
        Y: =542
        ZIndex: =4

        Text4 As modernText:
            Height: =82
            Text: ="Are you sure you want to delete this item? This action cannot be undone."
            Width: =615
            X: =13
            Y: =10
            ZIndex: =1

        ButtonCanvas11 As Button:
            BasePaletteColor: =
            BorderColor: =
            DisplayMode: =DisplayMode.Edit
            FontColor: =
            Height: =32
            OnSelect: |-
                =Set(varItemDel, Blank());
                Set(varShDelConfirm,false)
            Text: ="Cancel"
            Width: =96
            X: =468
            Y: =60
            ZIndex: =2

        ButtonCanvas12 As Button:
            BasePaletteColor: =
            BorderColor: =
            DisplayMode: =DisplayMode.Edit
            FontColor: =
            Height: =32
            Icon: ="Delete"
            OnSelect: |-
                =IfError(Remove('ELEC1005-Lab-Habits', varItemDel), Notify("Delete failed. You may not have permission or the item was already removed.",NotificationType.Error),
                Notify(
                        "Item deleted successfully.",
                        NotificationType.Success
                    )
                );
                Set(varItemDel,Blank());
                Set(varShDelConfirm, false)
            Text: ="Delete"
            Width: =96
            X: =358
            Y: =60
            ZIndex: =3

    "Gallery1 As gallery.'BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0'":
        BorderColor: =App.Theme.Colors.Darker40
        DelayItemLoading: =true
        Height: =942
        Items: =If(DropdownCanvas1.Selected.Value = "All", 'ELEC1005-Lab-Habits', Filter('ELEC1005-Lab-Habits', Category.Value = DropdownCanvas1.Selected.Value))
        Layout: =Layout.Vertical
        LoadingSpinner: =LoadingSpinner.Data
        ShowNavigation: =true
        TemplatePadding: =0
        TemplateSize: =104
        Y: =136
        ZIndex: =5

        Image1 As image:
            BorderColor: =App.Theme.Colors.Darker40
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            DisabledFill: =RGBA(244, 244, 244, 1)
            Height: =72
            OnSelect: =Select(Parent)
            RadiusBottomLeft: =8
            RadiusBottomRight: =8
            RadiusTopLeft: =8
            RadiusTopRight: =8
            Width: =72
            X: =16
            Y: =(Parent.TemplateHeight / 2) - (Self.Height / 2)
            ZIndex: =2

        Title1 As label:
            Color: =RGBA(50, 49, 48, 1)
            DisabledColor: =RGBA(166, 166, 166, 1)
            Font: =App.Theme.Font
            FontWeight: =If(ThisItem.IsSelected, FontWeight.Semibold, FontWeight.Normal)
            Height: =Self.Size * 1.8
            OnSelect: =Select(Parent)
            PaddingBottom: =0
            PaddingLeft: =0
            PaddingRight: =0
            PaddingTop: =0
            Text: =ThisItem.Title
            VerticalAlign: =VerticalAlign.Top
            Width: =Parent.TemplateWidth - 173
            X: =103
            Y: =(Parent.TemplateHeight - (Self.Size * 1.8 + Subtitle1.Size * 1.8)) / 2
            ZIndex: =3

        Subtitle1 As label:
            Color: =RGBA(0, 0, 0, 1)
            DisabledColor: =RGBA(166, 166, 166, 1)
            Font: =App.Theme.Font
            FontWeight: =If(ThisItem.IsSelected, FontWeight.Semibold, FontWeight.Normal)
            Height: =Self.Size * 1.8
            OnSelect: =Select(Parent)
            PaddingBottom: =0
            PaddingLeft: =0
            PaddingRight: =0
            PaddingTop: =0
            Size: =12
            Text: =ThisItem.Category.Value
            VerticalAlign: =VerticalAlign.Top
            Width: =Title1.Width
            X: =Title1.X
            Y: =Title1.Y + Title1.Height
            ZIndex: =4

        NextArrow1 As icon.ChevronRight:
            AccessibleLabel: =Self.Tooltip
            Color: =RGBA(166, 166, 166, 1)
            Height: =50
            Icon: =Icon.ChevronRight
            OnSelect: =Select(Parent)
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
            PaddingTop: =16
            Tooltip: ="View item details"
            Width: =50
            X: =Parent.TemplateWidth - Self.Width - 12
            Y: =(Parent.TemplateHeight / 2) - (Self.Height / 2)
            ZIndex: =5

        Separator1 As rectangle:
            BorderColor: =App.Theme.Colors.Darker40
            Fill: =RGBA(255, 255, 255, 1)
            Height: =8
            OnSelect: =Select(Parent)
            Width: =Parent.TemplateWidth
            Y: =Parent.TemplateHeight - Self.Height
            ZIndex: =6

        Text5 As modernText:
            Height: =50
            Text: =ThisItem.Frequency.Value
            Width: =101
            X: =213
            Y: =28
            ZIndex: =7

        Rectangle1 As rectangle:
            BorderColor: =App.Theme.Colors.Darker40
            Fill: =App.Theme.Colors.Darker30
            Height: =Parent.TemplateHeight - Separator1.Height
            OnSelect: =Select(Parent)
            Visible: =ThisItem.IsSelected
            Width: =4
            ZIndex: =8

        ButtonCanvas8 As Button:
            BasePaletteColor: =
            BorderColor: =
            DisplayMode: =DisplayMode.Edit
            FontColor: =
            Height: =31
            Icon: ="Delete"
            OnSelect: |-
                =Set(varItemDel, ThisItem);
                Set(varShDelConfirm,true)
            Text: =
            Width: =34
            X: =332
            Y: =38
            ZIndex: =9

        Toggle1 As Toggle:
            BasePaletteColor: =
            Checked: =ThisItem.'Completed Today'
            DisplayMode: =DisplayMode.Edit
            FontColor: =
            Height: =40
            Label: ="Done today"
            OnCheck: |-
                =Patch('ELEC1005-Lab-Habits',ThisItem, {'Completed Today':true})
            OnUncheck: |-
                =Patch('ELEC1005-Lab-Habits',ThisItem, {'Completed Today':false})
            Width: =164
            X: =413
            Y: =34
            ZIndex: =10

        ButtonCanvas7 As Button:
            BasePaletteColor: =
            BorderColor: =
            DisplayMode: =DisplayMode.Edit
            FontColor: =
            Height: =33
            Icon: ="Edit"
            OnSelect: |-
                =Navigate(EditHabit, ScreenTransition.Fade, {varSelectedItem: ThisItem})
            Text: =
            Width: =36
            X: =377
            Y: =38
            ZIndex: =11

    ButtonCanvas2 As Button:
        Align: =Align.Center
        BasePaletteColor: =
        BorderColor: =
        DisplayMode: =DisplayMode.Edit
        FontColor: =
        FontSize: =18
        Height: =32
        Icon: ="Add"
        OnSelect: =Navigate(AddHabit, ScreenTransition.Fade)
        Text: ="Habit"
        Width: =97
        X: =245
        Y: =104
        ZIndex: =6

